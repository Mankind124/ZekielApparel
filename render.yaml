services:
  - type: web
    name: zekiel-apparel-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: zekielapparel@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /var/data
      - key: UPLOADS_DIR
        value: /var/data/uploads
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
