name = "zekiel-apparel"
pages_build_output_dir = "."
compatibility_date = "2024-10-01"
compatibility_flags = ["nodejs_compat"]

# ── Bindings ─────────────────────────────────────────────────
# These are reference values. When deploying on Cloudflare, you
# create the KV namespace and R2 bucket in the dashboard and
# attach them to your Pages project with the SAME binding names
# (ZEKIEL_KV and ZEKIEL_R2). Environment variables (ADMIN_EMAIL,
# ADMIN_PASSWORD, JWT_SECRET) are also set in the dashboard.

[[kv_namespaces]]
binding = "ZEKIEL_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[[r2_buckets]]
binding = "ZEKIEL_R2"
bucket_name = "zekiel-apparel-uploads"
